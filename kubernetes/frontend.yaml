apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: rag-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:          
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: rag
spec:
  selector:
    app: frontend
  ports:
  - port: 80         
    targetPort: 3000 